<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Manager Portal — The Maine Cleaning Co.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafbfc; color: #1a1a2e; line-height: 1.6; }
  .container { max-width: 650px; margin: 0 auto; padding: 20px 16px; min-height: 100vh; }
  .header { text-align: center; padding: 24px 0 20px; }
  .logo { font-size: 16px; font-weight: 700; color: #1e40af; }
  .prop-name { font-size: 20px; font-weight: 700; color: #0f172a; margin-top: 8px; }
  .prop-addr { font-size: 13px; color: #64748b; margin-top: 2px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .stat { background: white; border: 1px solid #e8ecf0; border-radius: 12px; padding: 14px 10px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 800; }
  .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
  .c-blue { color: #2563eb; } .c-green { color: #16a34a; } .c-amber { color: #d97706; }

  .visit-card { background: white; border: 1px solid #e8ecf0; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .visit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .visit-title { font-weight: 600; font-size: 15px; color: #0f172a; }
  .visit-date { font-size: 12px; color: #64748b; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge-scheduled { background: #eff6ff; color: #2563eb; }
  .badge-confirmed { background: #eff6ff; color: #2563eb; }
  .badge-transit { background: #fffbeb; color: #d97706; }
  .badge-progress { background: #faf5ff; color: #9333ea; }
  .badge-completed { background: #f0fdf4; color: #16a34a; }
  .badge-cancelled { background: #fef2f2; color: #dc2626; }

  .visit-meta { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
  .visit-meta span { margin-right: 12px; }

  .progress-bar { background: #f1f5f9; border-radius: 6px; height: 6px; margin: 10px 0 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 6px; background: #16a34a; transition: width 0.3s; }
  .progress-label { font-size: 11px; color: #64748b; }

  .checklist-section { margin-top: 10px; }
  .section-name { font-size: 12px; font-weight: 600; color: #475569; margin: 8px 0 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .checklist-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; color: #334155; }
  .checklist-item .done { color: #16a34a; } .checklist-item .pending { color: #cbd5e1; }
  .item-photos { display: flex; gap: 4px; margin-left: auto; }
  .item-photos img { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; cursor: pointer; border: 1px solid #e8ecf0; }

  .photos-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .photos-grid img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; cursor: pointer; border: 1px solid #e8ecf0; }
  .photos-label { font-size: 11px; font-weight: 600; color: #64748b; margin-top: 12px; text-transform: uppercase; letter-spacing: 0.04em; }

  .notes { background: #f8fafc; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #475569; margin-top: 8px; font-style: italic; }

  .loading { text-align: center; padding: 60px 0; color: #94a3b8; font-size: 14px; }
  .error { text-align: center; padding: 40px; color: #dc2626; font-size: 14px; }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
  .lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">Loading property details...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search)
const propertyId = params.get('propertyId')
const token = params.get('token')

async function load() {
  const app = document.getElementById('app')
  const loading = document.getElementById('loading')

  let url = '/api/client?action=pm-portal'
  if (propertyId) url += `&propertyId=${propertyId}`
  if (token) url += `&token=${token}`

  try {
    const res = await fetch(url)
    if (!res.ok) throw new Error((await res.json()).error || 'Failed to load')
    const data = await res.json()

    loading.remove()
    app.innerHTML = renderPortal(data)
  } catch (err) {
    loading.innerHTML = `<div class="error">${err.message}</div>`
  }
}

function renderPortal(data) {
  const p = data.property
  const s = data.summary
  const statusBadge = (status) => {
    const map = { scheduled: 'badge-scheduled', confirmed: 'badge-confirmed', in_transit: 'badge-transit', in_progress: 'badge-progress', completed: 'badge-completed', cancelled: 'badge-cancelled', skipped: 'badge-cancelled' }
    const labels = { scheduled: 'Scheduled', confirmed: 'Confirmed', in_transit: 'On My Way', in_progress: 'In Progress', completed: 'Completed', cancelled: 'Cancelled', skipped: 'Skipped' }
    return `<span class="badge ${map[status] || 'badge-scheduled'}">${labels[status] || status}</span>`
  }

  return `
    <div class="header">
      <div class="logo">The Maine Cleaning Co.</div>
      <div class="prop-name">${p.name || p.address}</div>
      ${p.address ? `<div class="prop-addr">${p.address}</div>` : ''}
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num c-blue">${s.upcoming}</div><div class="stat-label">Upcoming</div></div>
      <div class="stat"><div class="stat-num c-amber">${s.inProgress}</div><div class="stat-label">In Progress</div></div>
      <div class="stat"><div class="stat-num c-green">${s.completed}</div><div class="stat-label">Completed</div></div>
    </div>
    ${data.visits.map(v => renderVisit(v, statusBadge)).join('')}
    ${data.visits.length === 0 ? '<p style="text-align:center;color:#94a3b8;padding:40px 0;">No visits found for this property.</p>' : ''}
    <div style="text-align:center;padding:20px 0;font-size:12px;color:#94a3b8;">
      The Maine Cleaning & Property Management Co.<br>(207) 572-0502
    </div>
  `
}

function renderVisit(v, statusBadge) {
  const date = new Date(v.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
  const hasChecklist = v.checklist && v.checklist.sections && v.checklist.sections.length > 0

  let checklistHtml = ''
  if (hasChecklist) {
    checklistHtml = `
      <div class="progress-bar"><div class="progress-fill" style="width:${v.completionPercent}%"></div></div>
      <div class="progress-label">${v.completionPercent}% complete</div>
      <div class="checklist-section">
        ${v.checklist.sections.map(s => `
          <div class="section-name">${s.name}</div>
          ${(s.items || []).map(i => `
            <div class="checklist-item">
              <span class="${i.completed ? 'done' : 'pending'}">${i.completed ? '&#10003;' : '&#9675;'}</span>
              ${i.task}
              ${i.photos && i.photos.length ? `<div class="item-photos">${i.photos.map(p => `<img src="${p.url}" onclick="showPhoto('${p.url}')" />`).join('')}</div>` : ''}
            </div>
          `).join('')}
        `).join('')}
      </div>
    `
  }

  let photosHtml = ''
  if (v.photosBefore.length || v.photosAfter.length) {
    photosHtml = `
      ${v.photosBefore.length ? `<div class="photos-label">Before</div><div class="photos-grid">${v.photosBefore.map(u => `<img src="${u}" onclick="showPhoto('${u}')" />`).join('')}</div>` : ''}
      ${v.photosAfter.length ? `<div class="photos-label">After</div><div class="photos-grid">${v.photosAfter.map(u => `<img src="${u}" onclick="showPhoto('${u}')" />`).join('')}</div>` : ''}
    `
  }

  return `
    <div class="visit-card">
      <div class="visit-header">
        <div>
          <div class="visit-title">${v.title}</div>
          <div class="visit-date">${date}${v.startTime ? ' at ' + v.startTime : ''}</div>
        </div>
        ${statusBadge(v.status)}
      </div>
      <div class="visit-meta">
        <span>Cleaner: ${v.cleaner}</span>
        ${v.source === 'ical_sync' || v.source === 'turno' ? '<span>Turnover</span>' : ''}
      </div>
      ${checklistHtml}
      ${photosHtml}
      ${v.employeeNotes ? `<div class="notes">"${v.employeeNotes}"</div>` : ''}
    </div>
  `
}

function showPhoto(url) {
  const lb = document.createElement('div')
  lb.className = 'lightbox'
  lb.innerHTML = `<img src="${url}" />`
  lb.onclick = () => lb.remove()
  document.body.appendChild(lb)
}

load()
// Auto-refresh every 60 seconds
setInterval(load, 60000)
</script>
</body>
</html>
