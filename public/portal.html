<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cleaning Portal — The Maine Cleaning Co.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.6; }
  .container { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
  .header { text-align: center; padding: 32px 0; }
  .header h1 { font-size: 20px; color: #1e40af; }
  .header .company { font-size: 13px; color: #94a3b8; margin-top: 2px; }
  .header p { font-size: 14px; color: #64748b; margin-top: 4px; }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .summary-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px; text-align: center; }
  .summary-card .num { font-size: 22px; font-weight: 700; }
  .summary-card .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
  .num-blue { color: #2563eb; }
  .num-green { color: #16a34a; }
  .num-yellow { color: #d97706; }
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .card h2 .count { background: #f1f5f9; color: #64748b; font-size: 11px; padding: 1px 7px; border-radius: 10px; }
  .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
  .item:last-child { border: none; }
  .item-title { font-weight: 600; color: #0f172a; font-size: 14px; }
  .item-sub { font-size: 13px; color: #64748b; margin-top: 2px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge-scheduled { background: #dbeafe; color: #1d4ed8; }
  .badge-completed { background: #dcfce7; color: #16a34a; }
  .badge-paid { background: #dcfce7; color: #16a34a; }
  .badge-sent { background: #fef3c7; color: #d97706; }
  .badge-overdue { background: #fee2e2; color: #dc2626; }
  .badge-draft { background: #f1f5f9; color: #64748b; }
  .badge-accepted { background: #dbeafe; color: #1d4ed8; }
  .badge-signed { background: #dcfce7; color: #16a34a; }
  .amount { font-weight: 700; font-size: 16px; }
  .pay-btn { display: inline-block; padding: 8px 16px; background: #1e40af; color: white; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; }
  .pay-btn:hover { background: #1d4ed8; }
  .empty { text-align: center; padding: 24px; color: #94a3b8; font-size: 14px; }
  .footer { text-align: center; padding: 24px 0; font-size: 12px; color: #94a3b8; }
  .loading { text-align: center; padding: 60px; color: #94a3b8; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; }
  .tab { padding: 8px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; color: #64748b; cursor: pointer; white-space: nowrap; }
  .tab.active { background: #1e40af; color: white; border-color: #1e40af; }
  .tab:hover:not(.active) { background: #f1f5f9; }
  .section { display: none; }
  .section.active { display: block; }
  .quote-price { font-size: 24px; font-weight: 800; color: #1e40af; text-align: center; margin: 12px 0; }
  .quote-detail { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f8fafc; }
  .quote-detail:last-child { border: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>The Maine Cleaning Co.</h1>
    <p id="companyName" class="company" style="display:none"></p>
    <p id="clientName">Loading...</p>
  </div>

  <div id="content" style="display:none">
    <!-- Summary cards -->
    <div id="summarySection" class="summary"></div>

    <!-- Navigation tabs -->
    <div class="tabs" id="tabs">
      <div class="tab active" data-section="upcoming">Upcoming</div>
      <div class="tab" data-section="quotes">Quotes</div>
      <div class="tab" data-section="history">History</div>
      <div class="tab" data-section="invoices">Invoices</div>
    </div>

    <!-- Upcoming Jobs -->
    <div id="upcoming" class="section active">
      <div class="card">
        <h2>Upcoming Visits <span id="upcomingCount" class="count">0</span></h2>
        <div id="jobs"></div>
      </div>
    </div>

    <!-- Quotes -->
    <div id="quotes" class="section">
      <div class="card">
        <h2>Your Quotes <span id="quotesCount" class="count">0</span></h2>
        <div id="quotesList"></div>
      </div>
    </div>

    <!-- History -->
    <div id="history" class="section">
      <div class="card">
        <h2>Completed Visits <span id="historyCount" class="count">0</span></h2>
        <div id="completedJobs"></div>
      </div>
    </div>

    <!-- Invoices -->
    <div id="invoices" class="section">
      <div class="card">
        <h2>Invoices <span id="invoicesCount" class="count">0</span></h2>
        <div id="invoicesList"></div>
      </div>
    </div>
  </div>

  <div id="loading" class="loading">Loading your information...</div>
  <div id="error" style="display:none" class="empty"></div>

  <div class="footer">
    The Maine Cleaning & Property Management Co.<br>
    (207) 572-0502 &middot; office@mainecleaningco.com
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search)
  var clientId = params.get('id')
  var token = params.get('token')

  if (!clientId && !token) {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('error').style.display = 'block'
    document.getElementById('error').textContent = 'Invalid link. Please contact us for your portal URL.'
    return
  }

  // Tab switching
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active') })
      document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active') })
      tab.classList.add('active')
      document.getElementById(tab.dataset.section).classList.add('active')
    })
  })

  function escapeHtml(str) {
    var div = document.createElement('div')
    div.textContent = str
    return div.innerHTML
  }

  function sanitizeUrl(url) {
    // Only allow https URLs for payment links
    if (!url || typeof url !== 'string') return ''
    try { var u = new URL(url); return (u.protocol === 'https:') ? url : '' } catch { return '' }
  }

  var portalUrl = token ? '/api/client?action=portal&token=' + token : '/api/client?action=portal&clientId=' + clientId
  fetch(portalUrl)
    .then(function(r) { return r.json() })
    .then(function(data) {
      document.getElementById('loading').style.display = 'none'

      if (data.error) {
        document.getElementById('error').style.display = 'block'
        document.getElementById('error').textContent = 'Could not load your information. Please contact us.'
        return
      }

      document.getElementById('content').style.display = 'block'
      document.getElementById('clientName').textContent = 'Welcome, ' + data.client.name

      if (data.client.companyName) {
        var cn = document.getElementById('companyName')
        cn.style.display = 'block'
        cn.textContent = data.client.companyName
      }

      // Summary
      var sum = data.summary || {}
      var summaryDiv = document.getElementById('summarySection')
      summaryDiv.innerHTML = '<div class="summary-card"><div class="num num-blue">' + (sum.upcomingVisits || 0) + '</div><div class="label">Upcoming</div></div>' +
        '<div class="summary-card"><div class="num num-green">' + (sum.completedVisits || 0) + '</div><div class="label">Completed</div></div>' +
        '<div class="summary-card"><div class="num num-yellow">' + (sum.outstanding > 0 ? '$' + sum.outstanding.toFixed(0) : '$0') + '</div><div class="label">Balance</div></div>'

      // Upcoming jobs
      var jobsDiv = document.getElementById('jobs')
      var upcoming = data.upcomingJobs || []
      document.getElementById('upcomingCount').textContent = upcoming.length
      if (upcoming.length === 0) {
        jobsDiv.innerHTML = '<p class="empty">No upcoming visits scheduled.</p>'
      } else {
        upcoming.forEach(function(j) {
          var date = new Date(j.date + 'T12:00:00')
          jobsDiv.innerHTML += '<div class="item"><div><div class="item-title">' + escapeHtml(j.title || '') + '</div><div class="item-sub">' + escapeHtml(date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })) + (j.startTime ? ' at ' + escapeHtml(j.startTime) : '') + (j.serviceType ? ' &middot; ' + escapeHtml(j.serviceType) : '') + '</div></div><span class="badge badge-' + escapeHtml(j.status || '') + '">' + escapeHtml(j.status || '') + '</span></div>'
        })
      }

      // Quotes
      var quotesDiv = document.getElementById('quotesList')
      var quotes = data.quotes || []
      document.getElementById('quotesCount').textContent = quotes.length
      if (quotes.length === 0) {
        quotesDiv.innerHTML = '<p class="empty">No quotes yet.</p>'
      } else {
        quotes.forEach(function(q) {
          var price = q.finalPrice > 0 ? '$' + q.finalPrice.toFixed(0) : ('$' + q.estimateMin + ' – $' + q.estimateMax)
          var freq = { 'one-time': 'One-Time', 'weekly': 'Weekly', 'biweekly': 'Every 2 Weeks', 'monthly': 'Monthly' }[q.frequency] || q.frequency || ''
          quotesDiv.innerHTML += '<div class="item"><div><div class="item-title">' + escapeHtml(q.quoteNumber || 'Quote') + '</div><div class="item-sub">' + escapeHtml(q.serviceType || '') + (freq ? ' &middot; ' + escapeHtml(freq) : '') + '</div></div><div style="text-align:right"><div class="amount">' + escapeHtml(price) + '</div><span class="badge badge-' + escapeHtml(q.status || '') + '">' + escapeHtml(q.status || '') + '</span></div></div>'
        })
      }

      // Completed jobs
      var completedDiv = document.getElementById('completedJobs')
      var completed = data.completedJobs || []
      document.getElementById('historyCount').textContent = completed.length
      if (completed.length === 0) {
        completedDiv.innerHTML = '<p class="empty">No completed visits yet.</p>'
      } else {
        completed.forEach(function(j) {
          var date = new Date(j.date + 'T12:00:00')
          completedDiv.innerHTML += '<div class="item"><div><div class="item-title">' + escapeHtml(j.title || '') + '</div><div class="item-sub">' + escapeHtml(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })) + (j.serviceType ? ' &middot; ' + escapeHtml(j.serviceType) : '') + '</div></div><span class="badge badge-completed">Completed</span></div>'
        })
      }

      // Invoices
      var invDiv = document.getElementById('invoicesList')
      var invoices = data.invoices || []
      document.getElementById('invoicesCount').textContent = invoices.length
      if (invoices.length === 0) {
        invDiv.innerHTML = '<p class="empty">No invoices.</p>'
      } else {
        invoices.forEach(function(i) {
          var safeStatus = escapeHtml(i.status || '')
          var actions = '<span class="badge badge-' + safeStatus + '">' + safeStatus + '</span>'
          var safePaymentUrl = sanitizeUrl(i.paymentUrl)
          if (safePaymentUrl && (i.status === 'sent' || i.status === 'overdue')) {
            actions = '<a href="' + escapeHtml(safePaymentUrl) + '" class="pay-btn" target="_blank" rel="noopener">Pay $' + i.total.toFixed(2) + '</a>'
          }
          invDiv.innerHTML += '<div class="item"><div><div class="item-title">' + escapeHtml(i.invoiceNumber || '') + '</div><div class="item-sub">' + escapeHtml(i.issueDate || '') + (i.dueDate ? ' &middot; Due ' + escapeHtml(i.dueDate) : '') + (i.paidAt ? ' &middot; Paid' : '') + '</div></div><div style="text-align:right"><div class="amount">$' + i.total.toFixed(2) + '</div>' + actions + '</div></div>'
        })
      }
    })
    .catch(function() {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('error').style.display = 'block'
      document.getElementById('error').textContent = 'Something went wrong. Please try again.'
    })
})()
</script>
</body>
</html>
