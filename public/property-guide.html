<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Guide — The Maine Cleaning Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: #F8FAFC; color: #0F172A; font-size: 10.5pt; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .page { max-width: 860px; margin: 0 auto; background: #F8FAFC; page-break-after: always; }
  .page:last-child { page-break-after: auto; }

  /* Hero */
  .hero { background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 55%, #1D4ED8 100%); padding: 40px 44px 32px; position: relative; overflow: hidden; }
  .hero-glow-1 { position: absolute; top: -60px; right: -60px; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(59,130,246,0.18) 0%, transparent 70%); }
  .hero-glow-2 { position: absolute; bottom: -30px; left: 40%; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%); }
  .hero-tag { display: inline-block; background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.4); border-radius: 100px; padding: 4px 14px; font-size: 8pt; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #93C5FD; margin-bottom: 16px; }
  .hero h1 { font-size: 36pt; font-weight: 900; color: #FFF; letter-spacing: -1px; line-height: 1.05; position: relative; z-index: 1; }
  .hero-sub { margin-top: 14px; font-size: 9.5pt; color: #94A3B8; font-weight: 400; position: relative; z-index: 1; }
  .hero-accent { margin-top: 20px; display: flex; align-items: center; gap: 8px; position: relative; z-index: 1; }
  .hero-accent-line { width: 32px; height: 3px; background: linear-gradient(90deg, #3B82F6, #06B6D4); border-radius: 2px; }
  .hero-accent-text { font-size: 8pt; color: #475569; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }

  /* Chips */
  .chips { display: flex; background: #FFF; border-bottom: 2px solid #F1F5F9; }
  .chip { flex: 1; padding: 16px 22px 14px; border-right: 1px solid #F1F5F9; position: relative; }
  .chip:last-child { border-right: none; }
  .chip-label { font-size: 7.5pt; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #3B82F6; display: block; margin-bottom: 5px; }
  .chip-val { font-size: 20pt; font-weight: 800; color: #0F172A; display: block; letter-spacing: -0.5px; }
  .chip::after { content: ''; position: absolute; bottom: 0; left: 22px; width: 24px; height: 2px; background: linear-gradient(90deg, #3B82F6, #06B6D4); border-radius: 1px; }

  /* Section headers */
  .sec { display: flex; align-items: center; gap: 14px; padding: 10px 28px; background: #F8FAFC; border-top: 1px solid #F1F5F9; margin-top: 2px; }
  .sec-pill { background: linear-gradient(135deg, #1D4ED8, #0EA5E9); color: #FFF; font-size: 7.5pt; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px; border-radius: 100px; white-space: nowrap; }
  .sec-rule { flex: 1; height: 1px; background: #E2E8F0; }

  /* Info table */
  .info-wrap { background: #FFF; padding: 4px 28px 8px; }
  .info-row { display: flex; align-items: center; min-height: 36px; border-bottom: 1px solid #F8FAFC; }
  .info-row:last-child { border-bottom: none; }
  .info-key { width: 190px; min-width: 190px; font-size: 8pt; font-weight: 600; color: #64748B; padding: 7px 14px 7px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .info-sep { width: 1px; height: 18px; background: #E2E8F0; margin-right: 14px; flex-shrink: 0; }
  .info-val { flex: 1; font-size: 9.5pt; color: #1E293B; font-weight: 500; }
  .info-val.empty { color: #CBD5E1; font-style: italic; font-weight: 400; }

  /* Linen table */
  .linen-wrap { background: #FFF; padding: 0 28px 8px; }
  .linen-head { display: flex; border-bottom: 1.5px solid #DBEAFE; padding: 5px 0 6px; }
  .linen-head span { font-size: 7.5pt; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #3B82F6; flex: 1; }
  .linen-row { display: flex; border-bottom: 1px solid #F8FAFC; padding: 7px 0; }
  .linen-row:last-child { border-bottom: none; }
  .linen-name { flex: 1; font-size: 9.5pt; color: #1E293B; font-weight: 500; }
  .linen-qty { flex: 1; font-size: 9.5pt; color: #64748B; }

  /* Scope */
  .scope-wrap { background: #FFF; padding: 8px 28px 12px; display: flex; gap: 32px; }
  .scope-col { flex: 1; }
  .scope-group { margin-bottom: 12px; }
  .scope-group:last-child { margin-bottom: 0; }
  .scope-title { font-size: 9pt; font-weight: 700; color: #1E40AF; margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px solid #DBEAFE; }
  .scope-item { font-size: 9pt; color: #475569; padding: 2.5px 0 2.5px 12px; position: relative; line-height: 1.45; }
  .scope-item::before { content: '\00B7'; position: absolute; left: 3px; color: #3B82F6; font-weight: 700; }

  /* Supplies */
  .supply-bar { background: linear-gradient(135deg, #EFF6FF 0%, #F0F9FF 100%); border-top: 1px solid #DBEAFE; border-bottom: 1px solid #DBEAFE; padding: 12px 28px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .supply-tag { background: linear-gradient(135deg, #1D4ED8, #0EA5E9); color: white; font-size: 7pt; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; white-space: nowrap; }
  .supply-note { font-size: 8.5pt; color: #3B82F6; font-style: italic; font-weight: 500; }
  .supply-items { display: flex; gap: 18px; flex-wrap: wrap; }
  .supply-item { font-size: 9pt; color: #1E40AF; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .supply-item::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: linear-gradient(135deg, #3B82F6, #06B6D4); flex-shrink: 0; }

  /* Notes */
  .notes-wrap { background: #FFF; padding: 14px 28px 20px; }
  .notes-text { font-size: 9.5pt; color: #475569; line-height: 1.6; white-space: pre-wrap; }
  .notes-empty { font-size: 8.5pt; color: #CBD5E1; font-style: italic; }

  /* Contact grid */
  .contact-grid { display: flex; background: #FFF; }
  .contact-col { flex: 1; padding: 20px 28px; }
  .contact-col + .contact-col { border-left: 1px solid #F1F5F9; }
  .contact-label { font-size: 7.5pt; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #3B82F6; margin-bottom: 12px; display: block; }

  /* Policies */
  .policy-wrap { background: #FFF; padding: 12px 28px 20px; }
  .policy-row { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; border-bottom: 1px solid #F8FAFC; font-size: 9.5pt; color: #475569; line-height: 1.55; }
  .policy-row:last-child { border-bottom: none; }
  .policy-num { background: linear-gradient(135deg, #1D4ED8, #0EA5E9); color: white; font-size: 8pt; font-weight: 800; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }

  .footer { text-align: center; padding: 32px 0 8px; font-size: 9pt; color: #CBD5E1; font-style: italic; letter-spacing: 0.3px; }

  /* Loading / error */
  .loading { text-align: center; padding: 80px 20px; font-size: 14px; color: #94A3B8; }
  .loading .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #3B82F6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Print button */
  .print-bar { position: fixed; top: 0; left: 0; right: 0; background: #0F172A; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
  .print-bar span { color: #94A3B8; font-size: 13px; }
  .print-bar button { padding: 8px 20px; background: linear-gradient(135deg, #1D4ED8, #0EA5E9); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }
  .print-bar button:hover { opacity: 0.9; }
  .print-bar .edit-link { color: #60A5FA; text-decoration: none; font-size: 13px; font-weight: 500; }
  .print-bar .edit-link:hover { color: #93C5FD; }

  @media print {
    body { background: white; }
    .page { max-width: 100%; }
    .print-bar { display: none; }
    body { padding-top: 0; }
  }
  @media screen { body { padding-top: 52px; } }
</style>
</head>
<body>

<div class="print-bar" id="printBar" style="display:none">
  <span id="printTitle">Property Guide</span>
  <div style="display:flex;gap:12px;align-items:center">
    <a class="edit-link" id="editLink" href="#">Edit Form</a>
    <button onclick="window.print()">Print / Save PDF</button>
  </div>
</div>

<div id="loadingState" class="loading">
  <div class="spinner"></div>
  Loading property guide...
</div>

<div id="guideContent" style="display:none"></div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search)
  var id = params.get('id')

  if (!id) {
    document.getElementById('loadingState').innerHTML = '<p>No property ID specified. Please use a valid link.</p>'
    return
  }

  fetch('/api/customer-form?id=' + id)
    .then(function(r) { return r.json() })
    .then(function(data) {
      if (data.error || !data.form) {
        document.getElementById('loadingState').innerHTML = '<p>Property guide not found.</p>'
        return
      }
      renderGuide(data.form)
    })
    .catch(function(err) {
      document.getElementById('loadingState').innerHTML = '<p>Error loading guide: ' + err.message + '</p>'
    })

  function esc(str) {
    if (!str) return ''
    var div = document.createElement('div')
    div.textContent = str
    return div.innerHTML
  }

  function val(v) {
    return v ? '<div class="info-val">' + esc(v) + '</div>' : '<div class="info-val empty">Not provided</div>'
  }

  function renderGuide(f) {
    document.getElementById('loadingState').style.display = 'none'
    document.getElementById('guideContent').style.display = 'block'
    document.getElementById('printBar').style.display = 'flex'
    document.getElementById('printTitle').textContent = f.property_name + ' — Property Guide'
    document.getElementById('editLink').href = '/customer-form.html?id=' + f.id
    document.title = f.property_name + ' — Property Guide'

    var subParts = []
    if (f.address_city) subParts.push(f.address_city)
    if (f.address_state) subParts.push(f.address_state)
    if (f.address_zip) subParts.push(f.address_zip)
    var locationStr = subParts.join(', ')
    var typeLabelMap = { rental: 'Short-Term Rental', residential: 'Residential', commercial: 'Commercial', marina: 'Marina' }
    var typeStr = typeLabelMap[f.property_type] || f.property_type || ''
    var subLine = [locationStr, typeStr, f.active_season ? 'Active: ' + f.active_season : ''].filter(Boolean).join(' &middot; ')

    // Build chips
    var chips = ''
    if (f.bedrooms) chips += '<div class="chip"><span class="chip-label">Bedrooms</span><span class="chip-val">' + f.bedrooms + '</span></div>'
    if (f.bathrooms) chips += '<div class="chip"><span class="chip-label">Bathrooms</span><span class="chip-val">' + f.bathrooms + '</span></div>'
    if (f.sqft) chips += '<div class="chip"><span class="chip-label">Square Feet</span><span class="chip-val">' + Number(f.sqft).toLocaleString() + '</span></div>'
    if (f.max_guests) chips += '<div class="chip"><span class="chip-label">Max Guests</span><span class="chip-val">' + f.max_guests + '</span></div>'

    // Split name for hero display
    var nameParts = f.property_name.split(/\s+/)
    var heroName = f.property_name
    if (nameParts.length > 2) {
      var mid = Math.ceil(nameParts.length / 2)
      heroName = nameParts.slice(0, mid).join(' ') + '<br>' + nameParts.slice(mid).join(' ')
    }

    // Build info rows
    var infoRows = ''
    var details = [
      ['Door Code', f.door_code], ['WiFi', (f.wifi_name || '') + (f.wifi_password ? ' / ' + f.wifi_password : '')],
      ['Trash Pickup', f.trash_pickup], ['Parking', f.parking],
      ['Bed Configuration', f.bed_configuration], ['Wash Linens On-Site', f.wash_linens_onsite],
      ['Supplies Stored', f.supplies_stored], ['Linen Closet', f.linen_closet],
    ]
    details.forEach(function(d) {
      infoRows += '<div class="info-row"><div class="info-key">' + d[0] + '</div><div class="info-sep"></div>' + val(d[1]) + '</div>'
    })

    // Build linen rows
    var linenHtml = ''
    var linens = f.linen_standard || []
    if (typeof linens === 'string') try { linens = JSON.parse(linens) } catch(e) { linens = [] }
    linens.forEach(function(l) {
      linenHtml += '<div class="linen-row"><span class="linen-name">' + esc(l.item) + '</span><span class="linen-qty">' + esc(l.quantity) + '</span></div>'
    })

    // Build scope
    var scope = f.scope_of_work || {}
    if (typeof scope === 'string') try { scope = JSON.parse(scope) } catch(e) { scope = {} }
    var scopeLabels = { kitchen: 'Kitchen', bedrooms: 'Bedrooms', bathrooms: 'Bathrooms', common: 'Common Areas', outdoor: 'Outdoor' }
    var scopeEmojis = { kitchen: '&#x1F373;', bedrooms: '&#x1F6CF;', bathrooms: '&#x1F6BF;', common: '&#x1F6CB;', outdoor: '&#x1F33F;' }
    var scopeGroups = Object.keys(scope).filter(function(k) { return scope[k].length > 0 })
    var leftGroups = scopeGroups.slice(0, Math.ceil(scopeGroups.length / 2))
    var rightGroups = scopeGroups.slice(Math.ceil(scopeGroups.length / 2))

    function buildScopeCol(groups) {
      return groups.map(function(g) {
        var items = scope[g].map(function(i) { return '<div class="scope-item">' + esc(i) + '</div>' }).join('')
        return '<div class="scope-group"><div class="scope-title">' + (scopeEmojis[g] || '') + '  ' + (scopeLabels[g] || g) + '</div>' + items + '</div>'
      }).join('')
    }

    // Supplies
    var supplies = f.supplies_list || []
    if (typeof supplies === 'string') try { supplies = JSON.parse(supplies) } catch(e) { supplies = [] }
    var supplyHtml = supplies.map(function(s) { return '<span class="supply-item">' + esc(s) + '</span>' }).join('')

    // Notes
    var notesHtml = f.special_notes
      ? '<div class="notes-text">' + esc(f.special_notes) + '</div>'
      : '<div class="notes-empty">No special notes provided.</div>'

    // PAGE 1: Property Guide
    var page1 = '<div class="page">' +
      '<div class="hero"><div class="hero-glow-1"></div><div class="hero-glow-2"></div>' +
      '<div class="hero-tag">The Maine Cleaning Co. &middot; Property Guide</div>' +
      '<h1>' + heroName + '</h1>' +
      '<div class="hero-sub">' + subLine + '</div>' +
      '<div class="hero-accent"><div class="hero-accent-line"></div><div class="hero-accent-text">Turnover Reference Guide</div></div>' +
      '</div>' +
      (chips ? '<div class="chips">' + chips + '</div>' : '') +
      '<div class="sec"><span class="sec-pill">Property Details &amp; Access</span><div class="sec-rule"></div></div>' +
      '<div class="info-wrap">' + infoRows + '</div>' +
      (linenHtml ? '<div class="sec"><span class="sec-pill">Linen &amp; Towel Standard</span><div class="sec-rule"></div></div><div class="linen-wrap"><div class="linen-head"><span>Item</span><span>Quantity &amp; Notes</span></div>' + linenHtml + '</div>' : '') +
      (scopeGroups.length > 0 ? '<div class="sec"><span class="sec-pill">Turnover Scope of Work</span><div class="sec-rule"></div></div><div class="scope-wrap"><div class="scope-col">' + buildScopeCol(leftGroups) + '</div><div class="scope-col">' + buildScopeCol(rightGroups) + '</div></div>' : '') +
      (supplyHtml ? '<div class="supply-bar"><div class="supply-tag">Supplies</div><div class="supply-note">Restock generously — leave plenty.</div><div class="supply-items">' + supplyHtml + '</div></div>' : '') +
      '<div class="sec"><span class="sec-pill">Notes &amp; Special Instructions</span><div class="sec-rule"></div></div>' +
      '<div class="notes-wrap">' + notesHtml + '</div>' +
      '</div>'

    // PAGE 2: Contact & Policies
    var page2 = '<div class="page">' +
      '<div class="hero"><div class="hero-glow-1"></div><div class="hero-glow-2"></div>' +
      '<div class="hero-tag">The Maine Cleaning Co. &middot; Property Guide</div>' +
      '<h1>Policies &amp;<br>Contact</h1>' +
      '<div class="hero-accent"><div class="hero-accent-line"></div><div class="hero-accent-text">' + esc(f.client_name || '') + ' &middot; Client File</div></div>' +
      '</div>' +
      '<div class="sec"><span class="sec-pill">Contact Information</span><div class="sec-rule"></div></div>' +
      '<div class="contact-grid">' +
        '<div class="contact-col"><span class="contact-label">The Maine Cleaning Co.</span>' +
        '<div class="info-row"><div class="info-key">Owner</div><div class="info-sep"></div><div class="info-val">Megan</div></div>' +
        '<div class="info-row"><div class="info-key">Phone</div><div class="info-sep"></div><div class="info-val">(207) 572-0502</div></div>' +
        '</div>' +
        '<div class="contact-col"><span class="contact-label">' + esc(f.client_name || 'Client') + '</span>' +
        '<div class="info-row"><div class="info-key">Email</div><div class="info-sep"></div>' + val(f.client_email) + '</div>' +
        '<div class="info-row"><div class="info-key">Phone</div><div class="info-sep"></div>' + val(f.client_phone) + '</div>' +
        (f.client_alt_phone ? '<div class="info-row"><div class="info-key">Alt. Phone</div><div class="info-sep"></div>' + val(f.client_alt_phone) + '</div>' : '') +
        (f.client_address ? '<div class="info-row"><div class="info-key">Address</div><div class="info-sep"></div>' + val(f.client_address) + '</div>' : '') +
        '<div class="info-row"><div class="info-key">Best Contact</div><div class="info-sep"></div>' + val(f.preferred_contact) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="sec"><span class="sec-pill">Scheduling &amp; Policies</span><div class="sec-rule"></div></div>' +
      '<div class="policy-wrap">' +
        '<div class="policy-row"><div class="policy-num">1</div>Turnovers are scheduled around check-out and check-in dates provided by the property owner. Please give as much advance notice as possible for any changes.</div>' +
        '<div class="policy-row"><div class="policy-num">2</div>Any damage, maintenance issues, or items of concern will be photographed and reported directly after every visit.</div>' +
        '<div class="policy-row"><div class="policy-num">3</div>Lost &amp; found items are held for 7 days and returned or disposed of per the owner\'s instructions.</div>' +
      '</div>' +
      '<div class="footer">Thank you for trusting The Maine Cleaning Co. with your property, ' + esc(f.client_name ? f.client_name.split(' ')[0] : '') + '.</div>' +
      '</div>'

    document.getElementById('guideContent').innerHTML = page1 + page2
  }
})()
</script>
</body>
</html>
