<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cleaning Quote — The Maine Cleaning Co.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.6; }
  .container { max-width: 560px; margin: 0 auto; padding: 24px 16px; }
  .header { text-align: center; padding: 24px 0; }
  .header h1 { font-size: 20px; color: #1e40af; }
  .header p { font-size: 14px; color: #64748b; margin-top: 4px; }
  .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card h2 { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-sent { background: #dbeafe; color: #1d4ed8; }
  .badge-accepted { background: #dcfce7; color: #16a34a; }
  .badge-declined { background: #fee2e2; color: #dc2626; }
  .badge-expired { background: #f1f5f9; color: #64748b; }
  .price-box { background: #eff6ff; border: 2px solid #bfdbfe; border-radius: 12px; padding: 20px; text-align: center; margin: 16px 0; }
  .price-main { font-size: 32px; font-weight: 800; color: #1e40af; }
  .price-sub { font-size: 13px; color: #64748b; margin-top: 4px; }
  .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
  .detail-row:last-child { border: none; }
  .detail-label { color: #64748b; font-size: 14px; }
  .detail-value { color: #0f172a; font-size: 14px; font-weight: 600; }
  .sig-area { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 4px; margin: 12px 0; background: white; position: relative; }
  .sig-area.signed { border-color: #22c55e; border-style: solid; }
  canvas { display: block; width: 100%; height: 150px; cursor: crosshair; touch-action: none; }
  .sig-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #94a3b8; font-size: 14px; pointer-events: none; transition: opacity 0.2s; }
  .sig-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .sig-actions button { padding: 6px 12px; border: 1px solid #e2e8f0; border-radius: 6px; background: white; color: #64748b; font-size: 12px; cursor: pointer; }
  .sig-actions button:hover { background: #f8fafc; }
  .pref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
  .pref-grid label { display: block; font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .pref-grid select, .pref-grid input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #0f172a; background: white; }
  .input-field { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #0f172a; margin: 8px 0; }
  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
  .btn-accept { background: #1e40af; color: white; margin-bottom: 8px; }
  .btn-accept:hover { background: #1d4ed8; }
  .btn-accept:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-decline { background: white; color: #64748b; border: 1px solid #e2e8f0; }
  .btn-decline:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
  .terms { font-size: 11px; color: #94a3b8; text-align: center; margin: 12px 0; line-height: 1.5; }
  .footer { text-align: center; padding: 24px 0; font-size: 12px; color: #94a3b8; }
  .loading { text-align: center; padding: 60px; color: #94a3b8; }
  .error-msg { text-align: center; padding: 40px; color: #dc2626; background: #fef2f2; border-radius: 12px; }
  .success-card { text-align: center; padding: 32px; }
  .success-icon { font-size: 48px; margin-bottom: 12px; }
  .success-title { font-size: 20px; font-weight: 700; color: #16a34a; margin-bottom: 8px; }
  .success-detail { font-size: 14px; color: #64748b; }
  .already-card { text-align: center; padding: 32px; }
  .already-icon { font-size: 36px; margin-bottom: 12px; }
  .items-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .items-table th { text-align: left; font-size: 11px; color: #94a3b8; text-transform: uppercase; padding: 6px 0; border-bottom: 1px solid #e2e8f0; }
  .items-table td { padding: 10px 0; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
  .items-table td:last-child { text-align: right; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>The Maine Cleaning Co.</h1>
    <p>Your Cleaning Quote</p>
  </div>

  <div id="loading" class="loading">Loading your quote...</div>
  <div id="error" style="display:none"></div>
  <div id="content" style="display:none"></div>

  <div class="footer">
    The Maine Cleaning & Property Management Co.<br>
    (207) 572-0502 &middot; office@mainecleaningco.com
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.search)
  var token = params.get('token')

  if (!token) {
    showError('Invalid link. Please contact us for your quote.')
    return
  }

  // Fetch quote data
  fetch('/api/quote-approve?token=' + encodeURIComponent(token))
    .then(function(r) { return r.json() })
    .then(function(data) {
      document.getElementById('loading').style.display = 'none'

      if (data.error) {
        showError(data.error)
        return
      }

      var q = data.quote
      var client = data.client
      var property = data.property

      // If already accepted/declined, show that status
      if (q.status === 'accepted') {
        showAlreadyAccepted(q, client)
        return
      }
      if (q.status === 'declined') {
        showAlreadyDeclined()
        return
      }
      if (q.status === 'expired') {
        showError('This quote has expired. Please contact us at (207) 572-0502 for a new quote.')
        return
      }

      // Show quote for review
      renderQuote(q, client, property, token)
    })
    .catch(function() {
      showError('Something went wrong. Please try again or call us at (207) 572-0502.')
    })

  function showError(msg) {
    document.getElementById('loading').style.display = 'none'
    var el = document.getElementById('error')
    el.style.display = 'block'
    el.innerHTML = '<div class="error-msg">' + msg + '</div>'
  }

  function showAlreadyAccepted(q, client) {
    var el = document.getElementById('content')
    el.style.display = 'block'
    el.innerHTML = '<div class="card"><div class="success-card">' +
      '<div class="success-icon">&#10003;</div>' +
      '<div class="success-title">Quote Accepted</div>' +
      '<div class="success-detail">Hi ' + (client.name || '').split(' ')[0] + ', this quote has already been accepted and your cleaning is scheduled.<br><br>Questions? Call us at (207) 572-0502.</div>' +
      '</div></div>'
  }

  function showAlreadyDeclined() {
    var el = document.getElementById('content')
    el.style.display = 'block'
    el.innerHTML = '<div class="card"><div class="already-card">' +
      '<div class="already-icon">&#x2715;</div>' +
      '<p style="color:#64748b;font-size:14px;">This quote has been declined.<br><br>Want to discuss? Call us at (207) 572-0502.</p>' +
      '</div></div>'
  }

  function renderQuote(q, client, property, token) {
    var el = document.getElementById('content')
    el.style.display = 'block'

    var freqLabel = { 'one-time': 'One-Time', 'weekly': 'Weekly', 'biweekly': 'Every 2 Weeks', 'monthly': 'Monthly' }[q.frequency] || q.frequency
    var serviceLabel = { 'standard': 'Standard Cleaning', 'deep': 'Deep Cleaning', 'move-in-out': 'Move-In/Move-Out Clean', 'airbnb-turnover': 'Rental Turnover' }[q.serviceType] || q.serviceType

    var html = ''

    // Greeting
    html += '<div class="card">'
    html += '<p style="font-size:15px;color:#334155;">Hi ' + (client.name || '').split(' ')[0] + ',</p>'
    html += '<p style="font-size:14px;color:#64748b;margin-top:8px;">Here\'s your cleaning quote. Review the details below, choose your preferred schedule, and sign to book.</p>'
    html += '</div>'

    // Quote details
    html += '<div class="card">'
    html += '<h2>Quote #' + q.quoteNumber + '</h2>'

    // Line items
    if (q.items && q.items.length > 0) {
      html += '<table class="items-table"><thead><tr><th>Service</th><th style="text-align:right">Price</th></tr></thead><tbody>'
      q.items.forEach(function(item) {
        html += '<tr><td>' + item.description + '</td><td>$' + parseFloat(item.total).toFixed(2) + '</td></tr>'
      })
      html += '</tbody></table>'
    }

    // Price
    html += '<div class="price-box">'
    html += '<div class="price-main">$' + q.finalPrice.toFixed(2) + '</div>'
    html += '<div class="price-sub">per cleaning &middot; ' + freqLabel + '</div>'
    if (q.estimateMin !== q.estimateMax) {
      html += '<div class="price-sub" style="margin-top:4px;">Range: $' + q.estimateMin.toFixed(0) + ' – $' + q.estimateMax.toFixed(0) + '</div>'
    }
    html += '</div>'

    // Details
    html += '<div style="margin-top:16px;">'
    html += '<div class="detail-row"><span class="detail-label">Service Type</span><span class="detail-value">' + serviceLabel + '</span></div>'
    html += '<div class="detail-row"><span class="detail-label">Frequency</span><span class="detail-value">' + freqLabel + '</span></div>'
    if (property) {
      html += '<div class="detail-row"><span class="detail-label">Property</span><span class="detail-value">' + (property.address || '') + '</span></div>'
      if (property.sqft) {
        html += '<div class="detail-row"><span class="detail-label">Size</span><span class="detail-value">' + property.sqft + ' sqft &middot; ' + (property.bathrooms || 0) + ' bath</span></div>'
      }
    }
    html += '</div>'
    html += '</div>'

    // Schedule preferences
    html += '<div class="card">'
    html += '<h2>Your Preferred Schedule</h2>'
    html += '<p style="font-size:13px;color:#64748b;margin-bottom:12px;">Choose your preferred day and time. We\'ll schedule your first cleaning based on this preference.</p>'
    html += '<div class="pref-grid">'
    html += '<div><label for="prefDay">Preferred Day</label>'
    html += '<select id="prefDay"><option value="1">Monday</option><option value="2">Tuesday</option><option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option></select></div>'
    html += '<div><label for="prefTime">Preferred Time</label>'
    html += '<select id="prefTime"><option value="08:00">8:00 AM</option><option value="09:00" selected>9:00 AM</option><option value="10:00">10:00 AM</option><option value="11:00">11:00 AM</option><option value="12:00">12:00 PM</option><option value="13:00">1:00 PM</option><option value="14:00">2:00 PM</option></select></div>'
    html += '</div></div>'

    // Signature
    html += '<div class="card">'
    html += '<h2>Approve & Sign</h2>'
    html += '<p style="font-size:13px;color:#64748b;margin-bottom:4px;">Print your name:</p>'
    html += '<input type="text" id="signerName" class="input-field" placeholder="Your full name" value="' + (client.name || '') + '">'
    html += '<p style="font-size:13px;color:#64748b;margin-top:12px;margin-bottom:4px;">Sign below (use your finger or mouse):</p>'
    html += '<div class="sig-area" id="sigArea"><canvas id="sigCanvas"></canvas><span class="sig-hint" id="sigHint">Sign here</span></div>'
    html += '<div class="sig-actions"><button type="button" onclick="clearSignature()">Clear</button></div>'

    html += '<div class="terms">By signing, you agree to the quoted price and cleaning schedule.<br>You can cancel or reschedule anytime with 24-hour notice.</div>'

    html += '<button id="acceptBtn" class="btn btn-accept" disabled onclick="submitAccept(\'' + token + '\')">Sign & Book Cleaning</button>'
    html += '<button id="declineBtn" class="btn btn-decline" onclick="submitDecline(\'' + token + '\')">No Thanks</button>'
    html += '</div>'

    el.innerHTML = html

    // Initialize signature canvas
    initSignature()
  }
})()

// ── Signature Canvas ──
var sigCanvas, sigCtx, sigDrawing = false, sigHasData = false

function initSignature() {
  sigCanvas = document.getElementById('sigCanvas')
  sigCtx = sigCanvas.getContext('2d')

  // High-DPI support
  var rect = sigCanvas.getBoundingClientRect()
  var dpr = window.devicePixelRatio || 1
  sigCanvas.width = rect.width * dpr
  sigCanvas.height = rect.height * dpr
  sigCtx.scale(dpr, dpr)
  sigCtx.strokeStyle = '#1e293b'
  sigCtx.lineWidth = 2.5
  sigCtx.lineCap = 'round'
  sigCtx.lineJoin = 'round'

  function getPos(e) {
    var rect = sigCanvas.getBoundingClientRect()
    var touch = e.touches ? e.touches[0] : e
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top }
  }

  function startDraw(e) {
    e.preventDefault()
    sigDrawing = true
    var pos = getPos(e)
    sigCtx.beginPath()
    sigCtx.moveTo(pos.x, pos.y)
  }

  function draw(e) {
    if (!sigDrawing) return
    e.preventDefault()
    var pos = getPos(e)
    sigCtx.lineTo(pos.x, pos.y)
    sigCtx.stroke()
    sigHasData = true
    document.getElementById('sigHint').style.opacity = '0'
    document.getElementById('sigArea').classList.add('signed')
    document.getElementById('acceptBtn').disabled = false
  }

  function stopDraw(e) {
    if (e) e.preventDefault()
    sigDrawing = false
  }

  // Mouse events
  sigCanvas.addEventListener('mousedown', startDraw)
  sigCanvas.addEventListener('mousemove', draw)
  sigCanvas.addEventListener('mouseup', stopDraw)
  sigCanvas.addEventListener('mouseleave', stopDraw)

  // Touch events
  sigCanvas.addEventListener('touchstart', startDraw, { passive: false })
  sigCanvas.addEventListener('touchmove', draw, { passive: false })
  sigCanvas.addEventListener('touchend', stopDraw, { passive: false })
}

function clearSignature() {
  if (!sigCanvas || !sigCtx) return
  var dpr = window.devicePixelRatio || 1
  sigCtx.clearRect(0, 0, sigCanvas.width / dpr, sigCanvas.height / dpr)
  sigHasData = false
  document.getElementById('sigHint').style.opacity = '1'
  document.getElementById('sigArea').classList.remove('signed')
  document.getElementById('acceptBtn').disabled = true
}

function getSignatureData() {
  if (!sigCanvas || !sigHasData) return null
  return sigCanvas.toDataURL('image/png')
}

function submitAccept(token) {
  var sig = getSignatureData()
  if (!sig) { alert('Please sign to approve.'); return }

  var signerName = document.getElementById('signerName').value
  var prefDay = parseInt(document.getElementById('prefDay').value)
  var prefTime = document.getElementById('prefTime').value

  var btn = document.getElementById('acceptBtn')
  btn.disabled = true
  btn.textContent = 'Confirming...'
  document.getElementById('declineBtn').style.display = 'none'

  fetch('/api/quote-approve?token=' + encodeURIComponent(token), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      signature: sig,
      signerName: signerName,
      preferredDay: prefDay,
      preferredTime: prefTime,
    }),
  })
  .then(function(r) { return r.json() })
  .then(function(data) {
    if (data.error) {
      btn.disabled = false
      btn.textContent = 'Sign & Book Cleaning'
      document.getElementById('declineBtn').style.display = 'block'
      alert(data.error)
      return
    }

    // Show success
    var content = document.getElementById('content')
    var jobDate = data.job ? new Date(data.job.date + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : ''

    content.innerHTML = '<div class="card"><div class="success-card">' +
      '<div class="success-icon">&#10003;</div>' +
      '<div class="success-title">You\'re All Set!</div>' +
      '<div class="success-detail">' +
      'Your cleaning has been booked.' +
      (jobDate ? '<br><br><strong>First cleaning:</strong> ' + jobDate + ' at ' + (data.job.startTime || '9:00 AM') : '') +
      '<br><br>We\'ll send a reminder before your appointment. Questions? Call us at (207) 572-0502.' +
      '</div></div></div>'
  })
  .catch(function() {
    btn.disabled = false
    btn.textContent = 'Sign & Book Cleaning'
    document.getElementById('declineBtn').style.display = 'block'
    alert('Something went wrong. Please try again.')
  })
}

function submitDecline(token) {
  if (!confirm('Are you sure you want to decline this quote?')) return

  var btn = document.getElementById('declineBtn')
  btn.disabled = true
  btn.textContent = 'Declining...'

  fetch('/api/quote-approve?token=' + encodeURIComponent(token) + '&action=decline', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ reason: '' }),
  })
  .then(function(r) { return r.json() })
  .then(function(data) {
    var content = document.getElementById('content')
    content.innerHTML = '<div class="card"><div class="already-card">' +
      '<p style="color:#64748b;font-size:14px;">Quote declined. No worries!<br><br>If you change your mind or want to discuss, call us at (207) 572-0502.</p>' +
      '</div></div>'
  })
  .catch(function() {
    btn.disabled = false
    btn.textContent = 'No Thanks'
  })
}
</script>
</body>
</html>
